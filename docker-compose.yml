version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: pc_postgres
    environment:
      POSTGRES_USER: peoplecounter
      POSTGRES_PASSWORD: peoplecounter123
      POSTGRES_DB: peoplecounter
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U peoplecounter"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pc_redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
